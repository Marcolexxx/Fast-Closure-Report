services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${PG_DATABASE}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - FILE_STORAGE_ROOT=${FILE_STORAGE_ROOT}
      - TZ=${TZ}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - FILE_STORAGE_ROOT=${FILE_STORAGE_ROOT}
      - TZ=${TZ}
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - api

  beat:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - FILE_STORAGE_ROOT=${FILE_STORAGE_ROOT}
      - TZ=${TZ}
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
      - api

  inference:
    build:
      context: ./inference_server
    environment:
      - TZ=${TZ}
    ports:
      - "8001:8001"
    depends_on:
      - redis

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pg_data:

