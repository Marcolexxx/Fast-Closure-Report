<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DesignBinder - AI-Copilot</title>
    <style>
      :root {
        --bg: #050816;
        --panel: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.1);
        --text: #e6edf3;
        --muted: rgba(230, 237, 243, 0.7);
        --accent: #6aa9ff;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
        background: radial-gradient(circle at top, #111827 0, #050816 55%, #020617 100%);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(11, 16, 32, 0.9);
        backdrop-filter: blur(6px);
      }
      .title {
        font-weight: 750;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
      }
      .wrap {
        padding: 12px 14px 14px;
        flex: 1;
        box-sizing: border-box;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        max-width: 920px;
        margin: 0 auto;
      }
      .btn {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      .btn.primary {
        border-color: var(--accent);
        background: rgba(106, 169, 255, 0.12);
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        padding: 8px 10px;
        font-size: 12px;
        outline: none;
        min-height: 180px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div>
        <div class="title">DesignBinder · 设计图绑定</div>
        <div class="meta" id="metaTask">taskId=-</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn" type="button" onclick="window.history.back()">返回工作台</button>
        <button class="btn primary" id="btnSubmit" type="button">提交绑定</button>
      </div>
    </div>
    <div class="wrap">
      <div class="panel">
        <div style="font-weight:700; margin-bottom:8px;">MVP：用 JSON 描述 bindings</div>
        <textarea id="area" spellcheck="false"></textarea>
        <div class="status" id="status">-</div>
      </div>
    </div>
    <script>
      (function(){
        const params=new URLSearchParams(location.search);
        const taskId=params.get('taskId')||'t1';
        document.getElementById('metaTask').textContent='taskId='+taskId;
        const key='aicopilot:design:'+taskId;
        const area=document.getElementById('area');
        const status=document.getElementById('status');
        try{
          const raw=localStorage.getItem(key);
          area.value=raw?raw:JSON.stringify({bindings:[]},null,2);
        }catch{ area.value=JSON.stringify({bindings:[]},null,2); }
        document.getElementById('btnSubmit').addEventListener('click', async ()=>{
          let data = null;
          try { data = JSON.parse(area.value); } catch { data = { raw: area.value }; }
          try{ localStorage.setItem(key, area.value); }catch{}
          status.textContent='提交中...';
          try {
            const res = await fetch(`/tasks/${encodeURIComponent(taskId)}/hil/submit`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ui_component: 'DesignBinder', data })
            });
            if (!res.ok) throw new Error(await res.text());
            status.textContent='已提交，任务将继续运行';
          } catch (e) {
            status.textContent='提交失败：' + (e && e.message ? e.message : String(e));
          }
        });
      })();
    </script>
  </body>
</html>
