<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReceiptMatcher - AI-Copilot</title>
    <style>
      :root {
        --bg: #050816;
        --panel: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.1);
        --text: #e6edf3;
        --muted: rgba(230, 237, 243, 0.7);
        --accent: #6aa9ff;
        --warn: #ffb020;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
        background: radial-gradient(circle at top, #111827 0, #050816 55%, #020617 100%);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(11, 16, 32, 0.9);
        backdrop-filter: blur(6px);
      }
      .title {
        font-weight: 750;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
      }
      .wrap {
        padding: 12px 14px 14px;
        flex: 1;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 12px;
        min-height: 0;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      .btn.primary {
        border-color: var(--accent);
        background: rgba(106, 169, 255, 0.12);
      }
      .btn.warn {
        border-color: var(--warn);
        background: rgba(255, 176, 32, 0.12);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th,
      td {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 6px;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-weight: 650;
        text-align: left;
        position: sticky;
        top: 0;
        background: rgba(11, 16, 32, 0.9);
      }
      .scroll {
        overflow: auto;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        flex: 1;
        min-height: 0;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        padding: 8px 10px;
        font-size: 12px;
        outline: none;
      }
      textarea {
        min-height: 160px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--muted);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div>
        <div class="title">ReceiptMatcher · 凭据配对确认</div>
        <div class="meta" id="metaTask">taskId=-</div>
      </div>
      <div class="toolbar">
        <button class="btn" type="button" onclick="window.history.back()">返回工作台</button>
        <button class="btn warn" id="btnLoad" type="button">从 JSON 加载</button>
        <button class="btn primary" id="btnConfirm" type="button">确认提交</button>
      </div>
    </div>

    <div class="wrap">
      <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
          <div style="font-weight: 700;">配对结果 <span class="tag" id="tagCount">0</span></div>
          <div class="status" id="draftStatus">草稿未保存</div>
        </div>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th style="width: 32px;">#</th>
                <th>Payment</th>
                <th>Invoice</th>
                <th style="width: 110px;">操作</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div style="font-weight: 700;">输入/导出 JSON</div>
        <div class="status">粘贴 `match_receipts` 的输出（包含 `matches/unmatched`），或直接编辑再点击“从 JSON 加载”。</div>
        <textarea id="jsonArea" spellcheck="false"></textarea>
        <div class="status" id="status">-</div>
      </div>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const taskId = params.get("taskId") || "t1";
        document.getElementById("metaTask").textContent = "taskId=" + taskId;

        const draftKey = "aicopilot:receipt:" + taskId;
        const tbody = document.getElementById("tbody");
        const jsonArea = document.getElementById("jsonArea");
        const statusEl = document.getElementById("status");
        const draftStatusEl = document.getElementById("draftStatus");
        const tagCount = document.getElementById("tagCount");

        let state = {
          matches: [],
          unmatched: []
        };

        function safeParse(s) {
          try { return JSON.parse(s); } catch { return null; }
        }

        function summarizeReceipt(r) {
          if (!r) return "-";
          const merchant = r.merchant || "";
          const amount = r.amount != null ? String(r.amount) : "";
          const date = r.date || "";
          const invoice = r.invoice_no || "";
          return `${merchant} ${amount} ${date} ${invoice}`.trim() || JSON.stringify(r);
        }

        function render() {
          tbody.innerHTML = "";
          tagCount.textContent = String(state.matches.length);

          state.matches.forEach((m, idx) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${idx + 1}</td>
              <td>${escapeHtml(summarizeReceipt(m.payment))}</td>
              <td>${escapeHtml(summarizeReceipt(m.invoice))}</td>
              <td>
                <button class="btn" data-action="swap" data-idx="${idx}" type="button">交换</button>
                <button class="btn" data-action="del" data-idx="${idx}" type="button">删除</button>
              </td>
            `;
            tbody.appendChild(tr);
          });

          const exportJson = {
            matches: state.matches,
            unmatched: state.unmatched
          };
          jsonArea.value = JSON.stringify(exportJson, null, 2);
        }

        function escapeHtml(s) {
          return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
        }

        function saveDraft(note) {
          try {
            localStorage.setItem(draftKey, JSON.stringify(state));
            draftStatusEl.textContent = (note || "草稿已保存") + " " + new Date().toLocaleTimeString();
          } catch {}
        }

        function loadDraft() {
          try {
            const raw = localStorage.getItem(draftKey);
            if (!raw) return false;
            const obj = JSON.parse(raw);
            if (obj && Array.isArray(obj.matches)) {
              state = obj;
              draftStatusEl.textContent = "已从草稿恢复";
              return true;
            }
          } catch {}
          return false;
        }

        document.getElementById("btnLoad").addEventListener("click", () => {
          const obj = safeParse(jsonArea.value.trim());
          if (!obj) {
            statusEl.textContent = "JSON 解析失败";
            return;
          }
          state.matches = Array.isArray(obj.matches) ? obj.matches : [];
          state.unmatched = Array.isArray(obj.unmatched) ? obj.unmatched : [];
          statusEl.textContent = "已加载 JSON";
          saveDraft("已保存");
          render();
        });

        tbody.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;
          const idx = parseInt(btn.dataset.idx, 10);
          const action = btn.dataset.action;
          if (!Number.isFinite(idx)) return;

          if (action === "swap") {
            const m = state.matches[idx];
            state.matches[idx] = { ...m, payment: m.invoice, invoice: m.payment, match_type: "human_swap" };
            saveDraft("已保存");
            render();
          } else if (action === "del") {
            state.matches.splice(idx, 1);
            saveDraft("已保存");
            render();
          }
        });

        document.getElementById("btnConfirm").addEventListener("click", async () => {
          saveDraft("已确认");
          statusEl.textContent = "提交中...";
          try {
            const res = await fetch(`/tasks/${encodeURIComponent(taskId)}/hil/submit`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ui_component: "ReceiptMatcher", data: state }),
            });
            if (!res.ok) throw new Error(await res.text());
            statusEl.textContent = "已提交，任务将继续运行";
          } catch (e) {
            statusEl.textContent = "提交失败：" + (e && e.message ? e.message : String(e));
          }
        });

        // init
        const restored = loadDraft();
        if (!restored) {
          state.matches = [];
          state.unmatched = [];
          jsonArea.value = JSON.stringify(state, null, 2);
        }
        render();
        setInterval(() => saveDraft("自动保存"), 30000);
      })();
    </script>
  </body>
</html>
